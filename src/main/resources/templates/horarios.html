<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Horarios</title>
        <link rel="stylesheet" th:href="@{/css/styles.css}">
    </head>

    <body class="horarios-page">

    <div class="menu-admin">
        <a href="/home">Inicio</a>
        <a href="/empleados">Empleados</a>
        <a href="/horarios">Horarios</a>
    </div>

    <div class="container">

        <h2>Control de Horarios</h2>

        <div class="estado">
            Estado:
            <span th:text="${estado}"
                th:classappend="${estado == 'En línea'} ? 'en-linea' : 'fuera-linea'">
            </span>
        </div>

        <div th:if="${error}" class="error">
            <p th:text="${error}"></p>
        </div>

        <div class="botones-horario">

            <form th:action="@{/horarios/entrada}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <button class="btn-entrada">Registrar Entrada</button>
            </form>

            <form th:action="@{/horarios/salida}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <button class="btn-salida">Registrar Salida</button>
            </form>

        </div>

        <table>
            <thead>
                <tr>
                    <th>Usuario</th>
                    <th>Hora Entrada</th>
                    <th>Hora Salida</th>
                    <th>Estado</th>
                </tr>
            </thead>

            <tbody>
                <tr th:each="h : ${horarios}">
                    <td th:text="${h.usuario.nombre}"></td>
                    <td th:text="${h.horaEntrada}"></td>
                    <td th:text="${h.horaSalida}"></td>

                    <td>
                        <span th:if="${h.horaSalida == null}" class="en-linea">
                            En línea
                        </span>
                        <span th:if="${h.horaSalida != null}" class="fuera-linea">
                            Fuera de línea
                        </span>
                    </td>
                </tr>
            </tbody>
        </table>

    </div>

 
    <script th:if="${error}" th:inline="javascript">
        alert('[[${error}]]');
    </script>

    <script th:if="${success}" th:inline="javascript">
        alert('[[${success}]]');
    </script>
</body>
</html>
