<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Empleados</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="empleado-form">
    <h2>Registrar Empleado</h2>

    <form th:action="@{/empleados/guardar}" th:object="${empleado}" method="post">

        <input type="hidden" th:field="*{id}">

        <label>Nombre</label>
        <input type="text" th:field="*{nombre}" required>

        <label>Apellidos</label>
        <input type="text" th:field="*{apellidos}" required>

        <label>Cédula</label>
        <input type="text" th:field="*{cedula}" required>

        <label>Correo</label>
        <input type="email" th:field="*{correo}" required>

        <label>Teléfono</label>
        <input type="text" th:field="*{telefono}" required>

        <label>Edad</label>
        <input type="number" th:field="*{edad}" required>

        <label>Puesto</label>
        <input type="text" th:field="*{puesto}" required>

        <br><br>

        <button type="submit">Guardar</button>

        <button type="button" onclick="window.location.href='/empleados'">
        Volver
        </button>

    </form>

 

</body>
</html>
