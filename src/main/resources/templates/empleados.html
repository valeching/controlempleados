<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Empleados</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="empleados-page">
    <h2>Lista de Empleados</h2>

    <br><br>

    <table border="1">

        <th>Nombre</th>
        <th>Apellidos</th>
        <th>Cédula</th>
        <th>Correo</th>
        <th>Teléfono</th>
        <th>Edad</th>
        <th>Puesto</th>
        <th>Acciones</th>

        <tr th:each="e : ${empleados}">
            <td th:text="${e.nombre}"></td>
            <td th:text="${e.apellidos}"></td>
            <td th:text="${e.cedula}"></td>
            <td th:text="${e.correo}"></td>
            <td th:text="${e.telefono}"></td>
            <td th:text="${e.edad}"></td>
            <td th:text="${e.puesto}"></td>

            <td>
                <a th:href="@{/empleados/editar/{id}(id=${e.id})}">
                    <button type="button">Editar</button>
                </a>

                <a th:href="@{/empleados/eliminar/{id}(id=${e.id})}">
                    <button type="button">Eliminar</button>
                </a>
            </td>
        </tr>

    </table>

    <br><br>

    <a th:href="@{/home}">Volver</a>

</body>
</html>
